---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dgxclone.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dgxclone.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.backend.secretKey | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dgxclone.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dgxclone.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "dgxclone.fullname" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "dgxclone.fullname" . }}-backend
    spec:
      serviceAccountName: {{ include "dgxclone.fullname" . }}-backend
      containers:
        - name: backend
          image: "{{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}"
          imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              value: "redis://{{ include "dgxclone.fullname" . }}-redis:{{ .Values.redis.service.port }}"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "dgxclone.fullname" . }}-backend
                  key: SECRET_KEY
            - name: K8S_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: DCGM_URL
              value: "http://{{ include "dgxclone.fullname" . }}-dcgm:{{ .Values.dcgm.service.port }}/metrics"
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dgxclone.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dgxclone.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: {{ include "dgxclone.fullname" . }}-backend
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 8000
