{{- if .Values.ingress.enabled }}
---
# Ingress 1: backend /api/* with prefix-strip rewrite
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dgxclone.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dgxclone.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "dgxclone.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
---
# Ingress 2: frontend catch-all (no rewrite — preserves /_next/static/* paths)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dgxclone.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dgxclone.labels" . | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "dgxclone.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}
