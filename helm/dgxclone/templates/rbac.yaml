---
# ── Backend: cluster-wide read for k8s stats (nodes, pods, namespaces) ──────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dgxclone.fullname" . }}-backend
  labels:
    {{- include "dgxclone.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "namespaces"]
    verbs: ["get", "list"]
  # metrics-server node metrics (optional — k8s stats memory used)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # backend also streams pod logs for running jobs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "dgxclone.fullname" . }}-backend
  labels:
    {{- include "dgxclone.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "dgxclone.fullname" . }}-backend
subjects:
  - kind: ServiceAccount
    name: {{ include "dgxclone.fullname" . }}-backend
    namespace: {{ .Release.Namespace }}
---
# ── Worker: manage batch Jobs + read pods/logs in the release namespace ──────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "dgxclone.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dgxclone.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "dgxclone.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dgxclone.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "dgxclone.fullname" . }}-worker
subjects:
  - kind: ServiceAccount
    name: {{ include "dgxclone.fullname" . }}-worker
    namespace: {{ .Release.Namespace }}
