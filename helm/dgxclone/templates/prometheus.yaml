{{- if .Values.prometheus.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dgxclone.fullname" . }}-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dgxclone.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "dcgm"
        static_configs:
          - targets: ["{{ include "dgxclone.fullname" . }}-dcgm:{{ .Values.dcgm.service.port }}"]

      - job_name: "backend"
        static_configs:
          - targets: ["{{ include "dgxclone.fullname" . }}-backend:{{ .Values.backend.service.port }}"]
{{- if .Values.prometheus.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "dgxclone.fullname" . }}-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dgxclone.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.prometheus.persistence.storageClass }}
  storageClassName: {{ .Values.prometheus.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.prometheus.persistence.size }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dgxclone.fullname" . }}-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dgxclone.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "dgxclone.fullname" . }}-prometheus
  template:
    metadata:
      labels:
        app: {{ include "dgxclone.fullname" . }}-prometheus
    spec:
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image }}
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            {{- if .Values.prometheus.persistence.enabled }}
            - name: data
              mountPath: /prometheus
            {{- end }}
          {{- with .Values.prometheus.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "dgxclone.fullname" . }}-prometheus
        {{- if .Values.prometheus.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "dgxclone.fullname" . }}-prometheus
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dgxclone.fullname" . }}-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dgxclone.labels" . | nindent 4 }}
spec:
  type: {{ .Values.prometheus.service.type }}
  selector:
    app: {{ include "dgxclone.fullname" . }}-prometheus
  ports:
    - port: {{ .Values.prometheus.service.port }}
      targetPort: 9090
{{- end }}
