{{- if .Values.grafana.enabled }}
{{- if .Values.grafana.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "dgxclone.fullname" . }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dgxclone.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.grafana.persistence.storageClass }}
  storageClassName: {{ .Values.grafana.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.grafana.persistence.size }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dgxclone.fullname" . }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dgxclone.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "dgxclone.fullname" . }}-grafana
  template:
    metadata:
      labels:
        app: {{ include "dgxclone.fullname" . }}-grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.grafana.image }}
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.grafana.adminPassword | quote }}
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
          {{- if .Values.grafana.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
          {{- end }}
          {{- with .Values.grafana.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.grafana.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "dgxclone.fullname" . }}-grafana
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dgxclone.fullname" . }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dgxclone.labels" . | nindent 4 }}
spec:
  type: {{ .Values.grafana.service.type }}
  selector:
    app: {{ include "dgxclone.fullname" . }}-grafana
  ports:
    - port: {{ .Values.grafana.service.port }}
      targetPort: 3000
{{- end }}
