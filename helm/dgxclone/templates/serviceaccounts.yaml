---
# Backend service account — needs cluster-wide read for k8s stats panel
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "dgxclone.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dgxclone.labels" . | nindent 4 }}
---
# Worker service account — needs to create/manage batch Jobs and read pod logs
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "dgxclone.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dgxclone.labels" . | nindent 4 }}
